version: 2

sources:
  - name: favorita_metrics
    schema: "{{ env_var('DBT_DATASET') }}"
    tables:
      - name: favorita_train_company_daily_sales_metrics
        description: >
          Sales metrics (i.e. sales and its transformed features) at the company level.

      - name: favorita_train_store_daily_sales_metrics
        description: >
          Sales metrics (i.e. sales and its transformed features) at the store level.

models:
  - name: bqml_model_train
    description: >
      Creates BigQuery ML models from model_configs in dbt_project.yml. Training data is read from
      intermediate models (default ref int_train_input_daily; override via train_ref per config).
      See also int_train_input_store_daily, int_train_input_store_product_daily, and
      int_train_input_store_product_family_daily.

  - name: bqml_model_predict
    description: >
      Prediction outputs from BigQuery ML models. Feature input defaults to ref(int_train_input_daily);
      override via predict_ref in model_configs.
    columns:
      - name: unique_id
        description: Unique identifier for each model prediction run and date.
        tests:
          - not_null
          - unique
      - name: run_date
        description: Date the prediction job was executed.
        tests:
          - not_null
      - name: model_name
        description: BigQuery ML model name used for prediction.
        tests:
          - not_null
      - name: model_version
        description: Model version string from model configuration.
      - name: lifecycle
        description: Lifecycle status from model configuration (e.g., dev, prod).

  - name: bqml_model_evaluate
    description: >
      Evaluation metrics generated by BigQuery ML models. Training data defaults to
      ref(int_train_input_daily); override via train_ref in model_configs.
    columns:
      - name: unique_id
        description: Unique identifier for each model evaluation run.
        tests:
          - not_null
          - unique
      - name: run_date
        description: Date the evaluation job was executed.
        tests:
          - not_null
      - name: model_name
        description: BigQuery ML model name used for evaluation.
        tests:
          - not_null
      - name: model_version
        description: Model version string from model configuration.
      - name: lifecycle
        description: Lifecycle status from model configuration (e.g., dev, prod).

  - name: bqml_model_explain
    description: >
      Feature attribution outputs from BigQuery ML explainable predictions. Input defaults to
      ref(int_train_input_daily); override via predict_ref in model_configs.
    columns:
      - name: unique_id
        description: Unique identifier for each model explain run and date.
        tests:
          - not_null
          - unique
      - name: run_date
        description: Date the explain job was executed.
        tests:
          - not_null
      - name: model_name
        description: BigQuery ML model name used for explanation.
        tests:
          - not_null
      - name: model_version
        description: Model version string from model configuration.
      - name: lifecycle
        description: Lifecycle status from model configuration (e.g., dev, prod).
