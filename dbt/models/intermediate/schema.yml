version: 2

models:
  - name: int_sales_daily
    description: >
      Company-level daily training features and labels for forecasting models.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ['date']
      - dbt_utils.expression_is_true:
          expression: "feature_as_of_date = date_sub(date, interval 1 day)"
    columns:
      - name: date
        description: Date of the sales label.
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_favorita_date_spine')
              field: date
      - name: feature_as_of_date
        description: Date that feature windows are calculated as of.
        data_tests:
          - not_null
      - name: sales_company_l1d
        description: Label column representing daily company sales.
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0

  - name: int_sales_store_daily
    description: >
      Store-level daily training features and labels for forecasting models.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ['date', 'store_nbr']
      - dbt_utils.expression_is_true:
          expression: "feature_as_of_date = date_sub(date, interval 1 day)"
    columns:
      - name: date
        description: Date of the sales label.
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_favorita_date_spine')
              field: date
      - name: store_nbr
        description: Store identifier.
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_favorita_stores')
              field: store_nbr
      - name: feature_as_of_date
        description: Date that feature windows are calculated as of.
        data_tests:
          - not_null
      - name: sales_store_l1d
        description: Label column representing daily store sales.
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0

  - name: int_sales_store_product_daily
    description: >
      Store-product daily training features and labels for forecasting models.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ['date', 'store_nbr', 'product_id']
      - dbt_utils.expression_is_true:
          expression: "feature_as_of_date = date_sub(date, interval 1 day)"
    columns:
      - name: date
        description: Date of the sales label.
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_favorita_date_spine')
              field: date
      - name: store_nbr
        description: Store identifier.
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_favorita_stores')
              field: store_nbr
      - name: product_id
        description: Product identifier.
        data_tests:
          - not_null
          - relationships:
              to: source('favorita_raw', 'raw_favorita_items')
              field: item_nbr
      - name: feature_as_of_date
        description: Date that feature windows are calculated as of.
        data_tests:
          - not_null
      - name: sales_store_product_l1d
        description: Label column representing daily store-product sales.
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0

  - name: int_sales_store_product_family_daily
    description: >
      Store-product-family daily training features and labels for forecasting models.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ['date', 'store_nbr', 'product_family']
      - dbt_utils.expression_is_true:
          expression: "feature_as_of_date = date_sub(date, interval 1 day)"
    columns:
      - name: date
        description: Date of the sales label.
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_favorita_date_spine')
              field: date
      - name: store_nbr
        description: Store identifier.
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_favorita_stores')
              field: store_nbr
      - name: product_family
        description: Product family identifier.
        data_tests:
          - not_null
      - name: feature_as_of_date
        description: Date that feature windows are calculated as of.
        data_tests:
          - not_null
      - name: sales_store_family_l1d
        description: Label column representing daily store-product-family sales.
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
