version: 2

models:
  - name: stg_favorita_date_spine
    description: >
      One row per calendar day from the first training date through the last test date.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ['date']
    columns:
      - name: date
        description: Calendar date within the train-through-test range.
        data_tests:
          - unique
          - not_null

  - name: stg_favorita_stores
    description: >
      Store metadata (city, state, type, cluster). One row per store; no date dimension.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ['store_nbr']
    columns:
      - name: store_nbr
        description: Store identifier.
        data_tests:
          - unique
          - not_null

  - name: stg_favorita_holiday_events
    description: >
      Staged holiday and event calendar with surrogate key and date parts.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ['id']
    columns:
      - name: id
        description: Surrogate key for date, locale, type, description, and transferred flag.
        data_tests:
          - unique
          - not_null
      - name: date
        description: Calendar date of the holiday or event.
        data_tests:
          - not_null

  - name: stg_favorita_oil
    description: >
      Daily oil price aligned to the project date spine (includes train and test periods).
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ['date']
    columns:
      - name: date
        description: Calendar date.
        data_tests:
          - unique
          - not_null

  - name: stg_favorita_train
    description: >
      Staged training sales at store-product-day grain, enriched with product family.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ['date', 'store_nbr', 'product_id']
    columns:
      - name: id
        description: Surrogate key for date, store, and product.
        data_tests:
          - unique
          - not_null
      - name: date
        description: Sales date.
        data_tests:
          - not_null
      - name: store_nbr
        description: Store identifier.
        data_tests:
          - not_null
      - name: product_id
        description: Product (item) identifier.
        data_tests:
          - not_null

  - name: stg_favorita_test
    description: >
      Staged test-period grid at store-product-day grain for forecasting features.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ['date', 'store_nbr', 'product_id']
    columns:
      - name: id
        description: Surrogate key for date, store, and product.
        data_tests:
          - unique
          - not_null
      - name: date
        description: Forecast date.
        data_tests:
          - not_null
      - name: store_nbr
        description: Store identifier.
        data_tests:
          - not_null
      - name: product_id
        description: Product (item) identifier.
        data_tests:
          - not_null

  - name: stg_favorita_transactions
    description: >
      Store-level transaction counts by date (cross join of date spine and stores).
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ['date', 'store_nbr']
    columns:
      - name: id
        description: Surrogate key for date and store.
        data_tests:
          - unique
          - not_null
      - name: date
        description: Calendar date.
        data_tests:
          - not_null
      - name: store_nbr
        description: Store identifier.
        data_tests:
          - not_null

  - name: stg_favorita_store_holiday_events
    description: >
      Holiday events expanded to each store (locale and state matching rules).
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ['store_nbr', 'date']
    columns:
      - name: store_nbr
        description: Store identifier.
        data_tests:
          - not_null
      - name: date
        description: Calendar date.
        data_tests:
          - not_null
