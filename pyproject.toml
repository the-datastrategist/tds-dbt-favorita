# Tool configuration only — runtime deps are in requirements.txt (see requirements.in).

[tool.black]
line-length = 100
target-version = ['py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 100
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

[tool.flake8]
max-line-length = 100
extend-ignore = ["E203", "E266", "E501", "W503"]
exclude = [
    ".git",
    "__pycache__",
    ".venv",
    "venv",
    ".eggs",
    "*.egg",
    "build",
    "dist",
    ".mypy_cache",
    ".pytest_cache",
]

[tool.pytest.ini_options]
testpaths = ["vertex/tests", "orchestration/tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--verbose",
    "--cov=vertex",
    "--cov-report=term-missing",
    "--cov-report=html",
]
markers = [
    "unit: Unit tests",
    "integration: Integration tests",
    "slow: Slow running tests",
]

# Unit-test coverage gate (CI --cov-fail-under=65) applies to library code.
# Omit GCP Custom Job submitters and family train/predict/optimize CLIs (integration-heavy).
[tool.coverage.run]
source = ["vertex"]
omit = [
    "vertex/tests/*",
    "vertex/jobs/backfill.py",
    "vertex/jobs/run.py",
    "vertex/jobs/submit.py",
    "vertex/jobs/submit_pipeline.py",
    "vertex/jobs/gcp.py",
    "vertex/models/sklearn/optimize_random_forest.py",
    "vertex/models/sklearn/predict_random_forest.py",
    "vertex/models/sklearn/train_random_forest.py",
    "vertex/models/timeseries/optimize_timeseries.py",
    "vertex/models/timeseries/predict_timeseries.py",
    "vertex/models/timeseries/train_timeseries.py",
    "vertex/models/xgboost/train_xgboost.py",
    "vertex/models/xgboost/predict_xgboost.py",
    "vertex/utils/artifacts.py",
]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
[[tool.mypy.overrides]]
module = "xgboost.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "statsmodels.*"
ignore_missing_imports = true
