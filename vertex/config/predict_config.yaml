configs:
  - name: predict_xgboost
    description: XG-Boost model prediction
    inputs:
      project_id: the-data-strategist
      region: us-central1
      model_name: train_xgboost
      sql_query: |
          SELECT
            *
          FROM
            `the-data-strategist.favorita.favorita_train_store_daily_sales_features`
      excluded_columns:
        - store_id
        - product_id
        - entity_id
        - date
        - sales
      target_column: sales
      forecast_horizon: 7
    outputs:
      prediction_table: the-data-strategist.favorita.favorita_train_predictions
