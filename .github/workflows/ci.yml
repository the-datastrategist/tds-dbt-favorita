name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONPATH: .
  GOOGLE_PROJECT_ID: ci-placeholder
  GOOGLE_APPLICATION_CREDENTIALS: /tmp/ci-service-account.json
  DBT_DATASET: favorita
  BQ_RAW_DATASET: raw_favorita
  DBT_PROFILES_DIR: dbt/profiles
  BQ_LOCATION: US

jobs:
  python:
    name: Python lint and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Format check
        run: |
          black --check vertex orchestration
          isort --check-only vertex orchestration

      - name: Lint
        run: flake8 vertex orchestration

      - name: Type check
        run: mypy vertex orchestration

      - name: Validate model configs
        run: python -m vertex.config.validate_all

      - name: Unit tests
        run: pytest -m unit --cov-fail-under=65

      - name: Compile Vertex KFP pipeline (no GCP)
        run: |
          python -m vertex.pipelines.compile \
            --pipeline favorita_arima \
            --output /tmp/favorita_arima_pipeline.json \
            --training-image us-central1-docker.pkg.dev/ci/ci:latest \
            --skip-optimize --skip-predict

  dbt:
    name: dbt parse, compile, and docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Placeholder service account key
        run: echo '{}' > /tmp/ci-service-account.json

      - name: Install dbt packages
        run: dbt deps --project-dir dbt

      - name: Parse dbt project
        run: dbt parse --project-dir dbt

      - name: Compile dbt project
        run: dbt compile --project-dir dbt

      - name: Generate dbt docs
        run: dbt docs generate --project-dir dbt
